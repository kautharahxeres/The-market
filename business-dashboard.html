<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard - The Market</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">🏪 THE MARKET
            <div class="nav-links">
                <a href="#" class="nav-link-active">My Products</a>     </a>
                <div class="user-menu">
                    <span id="businessName" class="user-name"></span>
                    <button class="btn btn-small" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="business-header">
            <div>
                <h2>Your Products</h2>
                <p>Manage your product inventory</p>
            </div>
            <button class="btn btn-primary" onclick="navigateTo('add-product.html')">+ Add New Product</button>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search your products..." onkeyup="searchBusinessProducts()">
        </div>

        <div class="products-management">
            <table class="products-table" id="productsTable">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr class="empty-state">
                        <td colspan="6">No products added yet. <a href="add-product.html">Add your first product</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <div class="modal-header">
                <h3>Edit Product</h3>
            </div>
            <div class="modal-body">
                <form id="editProductForm" class="product-form">
                    <input type="hidden" id="editProductId">
                    
                    <div class="form-group">
                        <label for="editProductName">Product Name</label>
                        <input type="text" id="editProductName" required>
                    </div>

                    <div class="form-group">
                        <label for="editProductCategory">Category</label>
                        <input type="text" id="editProductCategory" required>
                    </div>

                    <div class="form-group">
                        <label for="editProductPrice">Price</label>
                        <input type="number" id="editProductPrice" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="editProductDescription">Description</label>
                        <textarea id="editProductDescription" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="editProductImage">Image URL</label>
                        <input type="url" id="editProductImage">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Update Product</button>
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
