<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - The Market</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">🏪 THE MARKET</a>
            <div class="nav-links">
                <a href="business-dashboard.html">Back to Dashboard</a>
                <div class="user-menu">
                    <span id="businessName" class="user-name"></span>
                    <button class="btn btn-small" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-card">
            <h2>Add New Product</h2>
            <p class="subtitle">Fill in the details below to add a new product to your store</p>

            <form id="addProductForm" class="product-form">
                <div class="form-group">
                    <label for="productName">Product Name *</label>
                    <input type="text" id="productName" name="productName" required placeholder="e.g., Wireless Headphones">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="productCategory">Category *</label>
                        <input type="text" id="productCategory" name="productCategory" required placeholder="e.g., Electronics">
                    </div>

                    <div class="form-group">
                        <label for="productPrice">Price ($) *</label>
                        <input type="number" id="productPrice" name="productPrice" step="0.01" min="0" required placeholder="0.00">
                    </div>
                </div>

                <div class="form-group">
                    <label for="productDescription">Description *</label>
                    <textarea id="productDescription" name="productDescription" required placeholder="Describe your product in detail..." rows="5"></textarea>
                </div>

                <div class="form-group">
                    <label for="productImage">Product Image URL</label>
                    <input type="url" id="productImage" name="productImage" placeholder="https://example.com/image.jpg">
                    <small>Paste the URL of your product image</small>
                </div>

                <div class="image-preview-section">
                    <label>Image Preview:</label>
                    <div id="imagePreview" class="image-preview">
                        <p>Image will appear here</p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="productStock">Stock Quantity *</label>
                    <input type="number" id="productStock" name="productStock" min="0" required placeholder="0">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add Product</button>
                    <a href="business-dashboard.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
